<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a3a3a">
<link rel="manifest" href="manifest.json">
<title>Dragon Companion — GHA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #faf7f2;
  --bg-warm: #f5f0e8;
  --bg-card: #ffffff;
  --text: #1a1a1a;
  --text-secondary: #5a5550;
  --text-muted: #9a9490;
  --accent: #1a5c5c;
  --accent-light: #e8f4f0;
  --accent-glow: #2a8a7a;
  --amber: #d4860a;
  --amber-light: #fef3dc;
  --amber-glow: rgba(212, 134, 10, 0.15);
  --red-soft: #c44040;
  --red-light: #fdeaea;
  --border: rgba(0,0,0,0.06);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.04);
  --radius: 14px;
  --radius-sm: 10px;
  --font-body: 'Instrument Sans', -apple-system, sans-serif;
  --font-display: 'Fraunces', Georgia, serif;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html {
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
  scroll-behavior: smooth;
}

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── Texture background ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(26,92,92,0.04) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(212,134,10,0.03) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* ── App shell ── */
.app {
  position: relative;
  z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
.header {
  padding: 20px 20px 0;
  position: sticky;
  top: 0;
  z-index: 100;
  background: linear-gradient(to bottom, var(--bg) 80%, transparent);
  padding-bottom: 16px;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 36px;
  height: 36px;
  background: var(--accent);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 18px;
  box-shadow: 0 2px 8px rgba(26,92,92,0.25);
}

.logo-text {
  font-family: var(--font-display);
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: -0.02em;
}

.logo-sub {
  font-family: var(--font-body);
  font-size: 0.65rem;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.header-actions {
  display: flex;
  gap: 6px;
}

.icon-btn {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 18px;
}

.icon-btn:hover {
  background: var(--accent-light);
  color: var(--accent);
  border-color: rgba(26,92,92,0.15);
}

.icon-btn.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
  box-shadow: 0 2px 8px rgba(26,92,92,0.3);
}

/* ── Search ── */
.search-wrap {
  position: relative;
}

.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 16px;
  pointer-events: none;
  transition: color 0.2s;
}

.search-input {
  width: 100%;
  padding: 13px 44px 13px 42px;
  border-radius: 12px;
  border: 1.5px solid var(--border);
  background: var(--bg-card);
  font-family: var(--font-body);
  font-size: 0.95rem;
  color: var(--text);
  outline: none;
  transition: all 0.25s;
  box-shadow: var(--shadow-sm);
}

.search-input::placeholder {
  color: var(--text-muted);
}

.search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(26,92,92,0.08), var(--shadow-md);
}

.search-input:focus ~ .search-icon {
  color: var(--accent);
}

.search-clear {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  width: 28px;
  height: 28px;
  border-radius: 8px;
  border: none;
  background: var(--bg-warm);
  color: var(--text-muted);
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition: all 0.15s;
}

.search-clear.visible { display: flex; }
.search-clear:hover { background: var(--red-light); color: var(--red-soft); }

/* ── Voice search button ── */
.voice-btn {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: none;
  background: var(--bg-warm);
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.25s;
  z-index: 2;
}

.voice-btn:hover {
  background: var(--accent-light);
  color: var(--accent);
}

.voice-btn.listening {
  background: var(--accent);
  color: white;
  box-shadow: 0 0 0 0 rgba(26,92,92,0.4);
  animation: voicePulse 1.5s ease-in-out infinite;
}

.voice-btn.hidden { display: none; }

@keyframes voicePulse {
  0%   { box-shadow: 0 0 0 0 rgba(26,92,92,0.4); }
  70%  { box-shadow: 0 0 0 10px rgba(26,92,92,0); }
  100% { box-shadow: 0 0 0 0 rgba(26,92,92,0); }
}

.voice-tooltip {
  position: absolute;
  right: 0;
  top: calc(100% + 6px);
  background: var(--text);
  color: white;
  font-size: 0.7rem;
  font-weight: 500;
  padding: 5px 10px;
  border-radius: 6px;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transform: translateY(-4px);
  transition: all 0.2s;
  z-index: 10;
}

.voice-tooltip.visible {
  opacity: 1;
  transform: translateY(0);
}

.voice-tooltip::before {
  content: '';
  position: absolute;
  top: -4px;
  right: 12px;
  width: 8px;
  height: 8px;
  background: var(--text);
  transform: rotate(45deg);
}

/* ── Tab bar ── */
.tabs {
  display: flex;
  gap: 4px;
  padding: 4px 20px;
  margin-top: 4px;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.tabs::-webkit-scrollbar { display: none; }

.tab {
  padding: 8px 14px;
  border-radius: 20px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-family: var(--font-body);
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  flex-shrink: 0;
}

.tab:hover { color: var(--text-secondary); background: var(--bg-warm); }

.tab.active {
  background: var(--accent);
  color: white;
  box-shadow: 0 2px 8px rgba(26,92,92,0.2);
}

.tab .count {
  display: inline-block;
  margin-left: 4px;
  font-size: 0.7rem;
  opacity: 0.7;
}

/* ── Results info ── */
.results-info {
  padding: 10px 20px 4px;
  font-size: 0.75rem;
  color: var(--text-muted);
  font-weight: 500;
}

/* ── Command list ── */
.command-list {
  flex: 1;
  padding: 8px 20px 120px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* ── Category header ── */
.category-header {
  font-family: var(--font-display);
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--accent);
  padding: 16px 0 4px;
  letter-spacing: -0.01em;
  display: flex;
  align-items: center;
  gap: 8px;
}

.category-header::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, var(--border), transparent);
}

/* ── Command card ── */
.command-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  transition: all 0.2s;
  cursor: pointer;
  animation: cardIn 0.3s ease both;
  position: relative;
  overflow: hidden;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.command-card:hover {
  border-color: rgba(26,92,92,0.15);
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}

.command-card:active {
  transform: scale(0.99);
}

.command-card.dragon {
  border-left: 3px solid var(--accent);
}

.command-card.emis {
  border-left: 3px solid var(--amber);
}

.cmd-content {
  flex: 1;
  min-width: 0;
}

.cmd-voice {
  font-weight: 600;
  font-size: 0.92rem;
  color: var(--text);
  margin-bottom: 3px;
  line-height: 1.3;
}

.cmd-voice .highlight {
  background: linear-gradient(to bottom, transparent 50%, rgba(26,92,92,0.12) 50%);
  border-radius: 2px;
}

.cmd-desc {
  font-size: 0.8rem;
  color: var(--text-secondary);
  line-height: 1.4;
}

.cmd-shortcut {
  display: flex;
  gap: 3px;
  flex-wrap: wrap;
  align-items: center;
  flex-shrink: 0;
  margin-top: 2px;
}

.key {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 3px 7px;
  border-radius: 6px;
  background: var(--bg-warm);
  border: 1px solid var(--border);
  font-family: var(--font-body);
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text-secondary);
  white-space: nowrap;
  box-shadow: 0 1px 0 rgba(0,0,0,0.04);
}

.key-sep {
  font-size: 0.65rem;
  color: var(--text-muted);
  margin: 0 1px;
}

.cmd-fav {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all 0.2s;
  flex-shrink: 0;
}

.cmd-fav:hover { color: var(--amber); background: var(--amber-light); }
.cmd-fav.starred { color: var(--amber); }

.cmd-badge {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 4px;
  font-size: 0.62rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-left: 6px;
  vertical-align: middle;
}

.cmd-badge.dragon-badge {
  background: var(--accent-light);
  color: var(--accent);
}

.cmd-badge.emis-badge {
  background: var(--amber-light);
  color: var(--amber);
}

/* ── Source toggle ── */
.source-toggle {
  display: flex;
  gap: 4px;
  padding: 4px;
  background: var(--bg-warm);
  border-radius: 10px;
  margin: 8px 20px 0;
}

.source-btn {
  flex: 1;
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  background: transparent;
  font-family: var(--font-body);
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}

.source-btn.active {
  background: var(--bg-card);
  color: var(--text);
  box-shadow: var(--shadow-sm);
}

.source-btn .dot {
  display: inline-block;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  margin-right: 5px;
  vertical-align: middle;
}

.source-btn .dot.dragon-dot { background: var(--accent); }
.source-btn .dot.emis-dot { background: var(--amber); }

/* ── Empty state ── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  animation: cardIn 0.4s ease;
}

.empty-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.4;
}

.empty-title {
  font-family: var(--font-display);
  font-size: 1.1rem;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

.empty-desc {
  font-size: 0.82rem;
  color: var(--text-muted);
}

/* ── Quiz mode ── */
.quiz-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 0.3s ease;
}

.quiz-overlay.visible { display: flex; }

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.quiz-card {
  background: var(--bg-card);
  border-radius: 20px;
  padding: 32px 28px;
  max-width: 400px;
  width: 100%;
  box-shadow: var(--shadow-lg);
  animation: quizIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  text-align: center;
}

@keyframes quizIn {
  from { opacity: 0; transform: scale(0.9) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.quiz-close {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 36px;
  height: 36px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.15);
  color: white;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.quiz-progress {
  font-size: 0.72rem;
  color: var(--text-muted);
  font-weight: 500;
  margin-bottom: 20px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.quiz-progress-bar {
  height: 4px;
  background: var(--bg-warm);
  border-radius: 2px;
  margin-bottom: 24px;
  overflow: hidden;
}

.quiz-progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s ease;
}

.quiz-question {
  font-family: var(--font-display);
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
  line-height: 1.4;
}

.quiz-hint {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 24px;
}

.quiz-answer {
  background: var(--bg-warm);
  border-radius: var(--radius-sm);
  padding: 16px;
  margin-bottom: 20px;
  min-height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
}

.quiz-answer.revealed {
  background: var(--accent-light);
  border: 1.5px solid rgba(26,92,92,0.2);
}

.quiz-answer-text {
  font-weight: 600;
  font-size: 1rem;
  color: var(--accent);
}

.quiz-answer-hidden {
  font-size: 0.85rem;
  color: var(--text-muted);
  font-style: italic;
}

.quiz-actions {
  display: flex;
  gap: 8px;
}

.quiz-btn {
  flex: 1;
  padding: 12px 16px;
  border-radius: 10px;
  border: none;
  font-family: var(--font-body);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.quiz-btn.primary {
  background: var(--accent);
  color: white;
  box-shadow: 0 2px 8px rgba(26,92,92,0.25);
}

.quiz-btn.primary:hover { background: var(--accent-glow); }

.quiz-btn.secondary {
  background: var(--bg-warm);
  color: var(--text-secondary);
}

.quiz-btn.secondary:hover { background: var(--border); }

.quiz-score {
  font-family: var(--font-display);
  font-size: 2.5rem;
  font-weight: 700;
  color: var(--accent);
  margin: 8px 0;
}

.quiz-score-label {
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-bottom: 24px;
}

/* ── Bottom nav ── */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: rgba(250,247,242,0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-around;
  padding: 8px 16px calc(8px + var(--safe-bottom));
  z-index: 150;
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 6px 12px;
  border-radius: 10px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font-body);
}

.nav-item:hover { color: var(--text-secondary); }

.nav-item.active {
  color: var(--accent);
}

.nav-icon { font-size: 20px; }
.nav-label { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.02em; }

/* ── Responsive ── */
@media (min-width: 481px) {
  .app {
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    box-shadow: 0 0 60px rgba(0,0,0,0.04);
  }
}

@media (max-width: 360px) {
  .header { padding: 16px 16px 0; }
  .command-list { padding: 8px 16px 120px; }
  .tabs { padding: 4px 16px; }
  .source-toggle { margin: 8px 16px 0; }
}

/* ── Scroll ── */
.command-list {
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* ── Transitions ── */
.fade-enter { opacity: 0; transform: translateY(4px); }
.fade-enter-active { opacity: 1; transform: translateY(0); transition: all 0.3s ease; }
</style>
</head>
<body>

<div class="app" id="app">
  <!-- Header -->
  <header class="header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
        </div>
        <div>
          <div class="logo-text">Dragon Companion</div>
          <div class="logo-sub">GHA Clinical Commands</div>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="quizBtn" title="Practice quiz" onclick="startQuiz()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/><path d="M9 10h6"/><path d="M9 14h4"/></svg>
        </button>
      </div>
    </div>
    <div class="search-wrap">
      <span class="search-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </span>
      <input class="search-input" id="searchInput" type="text" placeholder="Search or tap mic to speak..." autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="search-clear" id="searchClear" onclick="clearSearch()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>

let favourites = JSON.parse(localStorage.getItem('dragon_favs') || '[]');
let currentSource = 'all';
let currentCategory = 'all';
let currentView = 'browse';
let searchQuery = '';

// ══════════════════════════════════════
// CATEGORIES
// ══════════════════════════════════════

const CATEGORY_ORDER = [
  'Cancer Referrals', 'Referrals', 'Consultation', 'In Consultation',
  'Vitals', 'Tests & Investigations', 'Navigation', 'Tab Navigation',
  'Documents', 'Appointments', 'Care Record', 'Session'
];

function getCategories(cmds) {
  const cats = new Map();
  cmds.forEach(c => {
    if (!cats.has(c.category)) cats.set(c.category, 0);
    cats.set(c.category, cats.get(c.category) + 1);
  });
  return CATEGORY_ORDER.filter(c => cats.has(c)).map(c => ({ name: c, count: cats.get(c) }));
}

// ══════════════════════════════════════
// FILTERING
// ══════════════════════════════════════

function getFilteredCommands() {
  let cmds = COMMANDS;

  // Source filter
  if (currentSource !== 'all') {
    cmds = cmds.filter(c => c.source === currentSource);
  }

  // View filter
  if (currentView === 'favourites') {
    cmds = cmds.filter(c => favourites.includes(c.id));
  }

  // Search
  if (searchQuery.trim()) {
    const q = searchQuery.toLowerCase().trim();
    const words = q.split(/\s+/);
    cmds = cmds.filter(c => {
      const haystack = [c.voice, c.desc, c.shortcut || '', ...c.tags].join(' ').toLowerCase();
      return words.every(w => haystack.includes(w));
    });
  }

  // Category filter
  if (currentCategory !== 'all') {
    cmds = cmds.filter(c => c.category === currentCategory);
  }

  return cmds;
}

// ══════════════════════════════════════
// RENDERING
// ══════════════════════════════════════

function renderTabs() {
  let cmdsForCats = COMMANDS;
  if (currentSource !== 'all') cmdsForCats = cmdsForCats.filter(c => c.source === currentSource);
  if (currentView === 'favourites') cmdsForCats = cmdsForCats.filter(c => favourites.includes(c.id));

  const cats = getCategories(cmdsForCats);
  const total = cmdsForCats.length;

  let html = `<button class="tab ${currentCategory === 'all' ? 'active' : ''}" onclick="setCategory('all')">All<span class="count">${total}</span></button>`;
  cats.forEach(cat => {
    html += `<button class="tab ${currentCategory === cat.name ? 'active' : ''}" onclick="setCategory('${cat.name}')">${cat.name}<span class="count">${cat.count}</span></button>`;
  });

  document.getElementById('tabs').innerHTML = html;
}

function renderShortcut(shortcut) {
  if (!shortcut) return '<span class="key" style="background:var(--accent-light);color:var(--accent);border-color:rgba(26,92,92,0.15);">Say it</span>';

  // Handle descriptive shortcuts like "type ..."
  if (shortcut.startsWith('type ') || shortcut.includes('type "')) {
    return `<span class="key" style="font-weight:500;font-style:italic;font-size:0.68rem;">${escHtml(shortcut)}</span>`;
  }

  const parts = shortcut.split(',').map(s => s.trim());
  return parts.map((p, i) => {
    const keys = p.split('+').map(k => `<span class="key">${escHtml(k)}</span>`).join('');
    return (i > 0 ? '<span class="key-sep">then</span>' : '') + keys;
  }).join('');
}

function highlightMatch(text, query) {
  if (!query.trim()) return escHtml(text);
  const words = query.toLowerCase().trim().split(/\s+/);
  let result = escHtml(text);
  words.forEach(w => {
    if (w.length < 2) return;
    const regex = new RegExp(`(${w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    result = result.replace(regex, '<span class="highlight">$1</span>');
  });
  return result;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderCommands() {
  const cmds = getFilteredCommands();
  const list = document.getElementById('commandList');
  const info = document.getElementById('resultsInfo');

  if (cmds.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">${currentView === 'favourites' ? '&#9734;' : '&#128269;'}</div>
        <div class="empty-title">${currentView === 'favourites' ? 'No favourites yet' : 'No commands found'}</div>
        <div class="empty-desc">${currentView === 'favourites' ? 'Tap the star on any command to save it here' : 'Try different search terms or clear filters'}</div>
      </div>`;
    info.textContent = '';
    return;
  }

  // Group by category
  const grouped = new Map();
  cmds.forEach(c => {
    if (!grouped.has(c.category)) grouped.set(c.category, []);
    grouped.get(c.category).push(c);
  });

  info.textContent = `${cmds.length} command${cmds.length !== 1 ? 's' : ''}${searchQuery ? ' matching "' + searchQuery + '"' : ''}`;

  let html = '';
  const orderedCats = CATEGORY_ORDER.filter(c => grouped.has(c));

  orderedCats.forEach(catName => {
    const catCmds = grouped.get(catName);
    if (currentCategory === 'all' && !searchQuery) {
      html += `<div class="category-header">${catName}</div>`;
    }

    catCmds.forEach((cmd, i) => {
      const isFav = favourites.includes(cmd.id);
      const badge = cmd.source === 'dragon'
        ? '<span class="cmd-badge dragon-badge">Voice</span>'
        : '<span class="cmd-badge emis-badge">Keys</span>';

      html += `
        <div class="command-card ${cmd.source}" style="animation-delay:${Math.min(i * 0.03, 0.3)}s">
          <div class="cmd-content">
            <div class="cmd-voice">${highlightMatch(cmd.voice, searchQuery)}${badge}</div>
            <div class="cmd-desc">${highlightMatch(cmd.desc, searchQuery)}</div>
            <div class="cmd-shortcut" style="margin-top:8px">${renderShortcut(cmd.shortcut)}</div>
          </div>
          <button class="cmd-fav ${isFav ? 'starred' : ''}" onclick="toggleFav(event,'${cmd.id}')" title="${isFav ? 'Remove from favourites' : 'Add to favourites'}">
            ${isFav ? '&#9733;' : '&#9734;'}
          </button>
        </div>`;
    });
  });

  list.innerHTML = html;
}

function render() {
  renderTabs();
  renderCommands();
}

// ══════════════════════════════════════
// INTERACTIONS
// ══════════════════════════════════════

function setSource(source) {
  currentSource = source;
  currentCategory = 'all';
  document.querySelectorAll('.source-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.source === source);
  });
  render();
}

function setCategory(cat) {
  currentCategory = cat;
  render();
  // scroll tabs to show active
  const activeTab = document.querySelector('.tab.active');
  if (activeTab) activeTab.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}

function setView(view) {
  currentView = view;
  currentCategory = 'all';
  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.view === view);
  });
  if (view === 'quiz') {
    startQuiz();
    return;
  }
  render();
}

function toggleFav(e, id) {
  e.stopPropagation();
  const idx = favourites.indexOf(id);
  if (idx >= 0) favourites.splice(idx, 1);
  else favourites.push(id);
  localStorage.setItem('dragon_favs', JSON.stringify(favourites));
  render();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  searchQuery = '';
  document.getElementById('searchClear').classList.remove('visible');
  render();
  updateVoiceBtnPosition();
  document.getElementById('searchInput').focus();
}

// Search input
document.getElementById('searchInput').addEventListener('input', function(e) {
  searchQuery = e.target.value;
  document.getElementById('searchClear').classList.toggle('visible', searchQuery.length > 0);
  render();
});

// ══════════════════════════════════════
// QUIZ MODE
// ══════════════════════════════════════

let quizQuestions = [];
let quizIndex = 0;
let quizScore = 0;
let quizRevealed = false;

function startQuiz() {
  // Pick 10 random commands, prioritizing non-favourited ones (less familiar)
  const pool = [...COMMANDS];
  shuffleArray(pool);

  // Weight: non-favourites first
  pool.sort((a, b) => {
    const aFav = favourites.includes(a.id) ? 1 : 0;
    const bFav = favourites.includes(b.id) ? 1 : 0;
    return aFav - bFav;
  });

  quizQuestions = pool.slice(0, 10);
  quizIndex = 0;
  quizScore = 0;
  quizRevealed = false;

  document.getElementById('quizOverlay').classList.add('visible');
  renderQuiz();
}

function closeQuiz() {
  document.getElementById('quizOverlay').classList.remove('visible');
  // Reset nav highlight
  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.view === currentView);
  });
}

function renderQuiz() {
  const card = document.getElementById('quizCard');

  if (quizIndex >= quizQuestions.length) {
    // Show results
    const pct = Math.round((quizScore / quizQuestions.length) * 100);
    card.innerHTML = `
      <div class="quiz-progress">Quiz Complete</div>
      <div class="quiz-score">${pct}%</div>
      <div class="quiz-score-label">You knew ${quizScore} out of ${quizQuestions.length} commands</div>
      <div class="quiz-actions">
        <button class="quiz-btn secondary" onclick="closeQuiz()">Done</button>
        <button class="quiz-btn primary" onclick="startQuiz()">Try Again</button>
      </div>
    `;
    return;
  }

  const q = quizQuestions[quizIndex];
  const progress = ((quizIndex) / quizQuestions.length) * 100;
  const isVoiceQ = Math.random() > 0.5; // Randomly ask "what's the command" or "what does this do"

  let questionText, answerText;
  if (q.source === 'dragon') {
    questionText = `What happens when you say <em>"${escHtml(q.voice)}"</em>?`;
    answerText = q.desc;
  } else if (isVoiceQ) {
    questionText = `How do you: <em>${escHtml(q.desc)}</em>?`;
    answerText = q.shortcut || q.voice;
  } else {
    questionText = `What does <em>${escHtml(q.shortcut || q.voice)}</em> do?`;
    answerText = q.desc;
  }

  const badge = q.source === 'dragon' ? 'Dragon Voice Command' : 'EMIS Shortcut';

  card.innerHTML = `
    <div class="quiz-progress">Question ${quizIndex + 1} of ${quizQuestions.length} &middot; ${badge}</div>
    <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${progress}%"></div></div>
    <div class="quiz-question">${questionText}</div>
    <div class="quiz-hint">Think about it, then tap to reveal</div>
    <div class="quiz-answer ${quizRevealed ? 'revealed' : ''}" onclick="revealAnswer()">
      ${quizRevealed
        ? `<div class="quiz-answer-text">${escHtml(answerText)}</div>`
        : `<div class="quiz-answer-hidden">Tap to reveal answer</div>`}
    </div>
    <div class="quiz-actions">
      ${quizRevealed ? `
        <button class="quiz-btn secondary" onclick="quizAnswer(false)">Didn't know</button>
        <button class="quiz-btn primary" onclick="quizAnswer(true)">Knew it!</button>
      ` : `
        <button class="quiz-btn primary" onclick="revealAnswer()" style="width:100%">Reveal Answer</button>
      `}
    </div>
  `;
}

function revealAnswer() {
  quizRevealed = true;
  renderQuiz();
}

function quizAnswer(knew) {
  if (knew) quizScore++;
  quizIndex++;
  quizRevealed = false;
  renderQuiz();
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// ══════════════════════════════════════
// VOICE SEARCH (Web Speech API)
// ══════════════════════════════════════

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let isListening = false;

function initVoice() {
  const voiceBtn = document.getElementById('voiceBtn');

  if (!SpeechRecognition) {
    // Browser doesn't support speech recognition — hide the button
    voiceBtn.classList.add('hidden');
    return;
  }

  recognition = new SpeechRecognition();
  recognition.lang = 'en-GB';
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isListening = true;
    voiceBtn.classList.add('listening');
    showVoiceTooltip('Listening...');
    // Shift the clear button left to make room
    document.getElementById('searchInput').style.paddingRight = '80px';
  };

  recognition.onresult = (event) => {
    let transcript = '';
    let isFinal = false;

    for (let i = event.resultIndex; i < event.results.length; i++) {
      transcript += event.results[i][0].transcript;
      if (event.results[i].isFinal) isFinal = true;
    }

    // Update the search input live as they speak
    const input = document.getElementById('searchInput');
    input.value = transcript;
    searchQuery = transcript;
    document.getElementById('searchClear').classList.toggle('visible', transcript.length > 0);
    render();

    if (isFinal) {
      showVoiceTooltip('Got it!');
      setTimeout(() => hideVoiceTooltip(), 1200);
    }
  };

  recognition.onerror = (event) => {
    if (event.error === 'no-speech') {
      showVoiceTooltip('No speech detected');
    } else if (event.error === 'not-allowed') {
      showVoiceTooltip('Mic access denied');
    } else {
      showVoiceTooltip('Try again');
    }
    setTimeout(() => hideVoiceTooltip(), 2000);
  };

  recognition.onend = () => {
    isListening = false;
    voiceBtn.classList.remove('listening');
    updateVoiceBtnPosition();
  };
}

function toggleVoice() {
  if (!recognition) return;

  if (isListening) {
    recognition.stop();
  } else {
    // Clear existing search first if empty
    recognition.start();
  }
}

function showVoiceTooltip(text) {
  const tip = document.getElementById('voiceTooltip');
  tip.textContent = text;
  tip.classList.add('visible');
}

function hideVoiceTooltip() {
  document.getElementById('voiceTooltip').classList.remove('visible');
}

function updateVoiceBtnPosition() {
  // When there's text, shift voice btn left to make room for clear btn
  const hasText = document.getElementById('searchInput').value.length > 0;
  const voiceBtn = document.getElementById('voiceBtn');
  const input = document.getElementById('searchInput');

  if (hasText) {
    voiceBtn.style.right = '42px';
    input.style.paddingRight = '80px';
  } else {
    voiceBtn.style.right = '10px';
    input.style.paddingRight = '48px';
  }
}

// Hook into existing search input handler to reposition voice btn
const origInputHandler = document.getElementById('searchInput').oninput;
document.getElementById('searchInput').addEventListener('input', function() {
  updateVoiceBtnPosition();
});

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════

render();
initVoice();
updateVoiceBtnPosition();

// Register service worker for offline
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
